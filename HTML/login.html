<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *{
            padding: 0;
            margin:0;
        }

        form{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("https://static.vecteezy.com/system/resources/thumbnails/014/468/621/small/abstract-digital-technology-background-with-concept-security-vector.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }

        fieldset{
            border-radius: 10px 50px;
            padding: 50px 30px;
            width: 300px;
            /* background-image: linear-gradient(red, orange,pink); */
            border: none;
            border: 1px solid wheat;
            backdrop-filter: blur(5px);
            box-shadow: 3px 3px 3px aliceblue;
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
            background-image: linear-gradient(45deg,red, orange);
            color: transparent;
            -webkit-background-clip: text;
        }

        button{
            background-color: peru;
            padding:10px 30px ;
            border-radius: 10px;
            border: none;
            box-shadow: 8px 8px 8px ;
            color: aliceblue;
            font-weight: bold;
            font-style: italic;
            margin-left: 20px;
        }
        button:hover{
            transform: scale(1.1);
            cursor: pointer;
            text-shadow: 3px 3px 3px aliceblue;
            box-shadow: 3px 3px 3px purple;
            background-color: rgb(153, 98, 43);
        }

        label{
            color: aliceblue;
            font-weight: bold;
            font-style: italic;
        }
        label:first-of-type::before{
            content: "🙎🏻";
        }
        label:last-of-type::before{
            content:"🔐"
        }
        input{
            padding: 8px ;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Login</legend>

            <h1>Login</h1>
            <label for="username">Username: </label>
            <input type="text" id="username" placeholder="Enter Username"> 
            <br> <br>
            
            <label for="psw">Password:</label>
            <input type="password" id="psw" placeholder="Enter password">
            <br> <br>
            
            <button type="submit">Sign In</button>
            <button type="reset">Cancel</button>
        </fieldset>
    </form>
</body>
</html>
