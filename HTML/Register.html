<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style=" background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz8WY7SKB6VLzL8nn1JFSpoBbqEBKzz_jsnAebH7quTA&s=10');">
    <h1 class="text-center p-3 m-4" style="backdrop-filter: blur(10px);box-shadow: 5px 5px 5px 5px black;border-radius: 40px;">Register</h1>
    <form action="" style="display: flex;justify-content: center;" >
        <fieldset style="width: 450px;border: 2px solid red; padding: 30px; border-radius: 10px 50px; margin: 20px;backdrop-filter: blur(20px);background-image: linear-gradient(45deg,orange, salmon);">
            <div class="row">
                <div class="col form-group">
                    <label for="">First Name</label>
                    <input type="text" class="form-control" placeholder="Enter FirstName">
                </div>
                 <div class="col form-group">
                    <label for="">Last Name</label>
                    <input type="text" class="form-control" placeholder="Enter LastName">
                </div>
            </div>



         

            <div class="row">
                <div class="col form-group">
                    <label for="">Email</label>
                    <input type="email" class="form-control" placeholder="Enter Email">
                </div>
                
            </div>

            <div class="row my-2">
                <div class="col form-group">
                    <label for="">Phone NO:</label>
                    <input type="tel" placeholder="+91" class="form-control">
                </div>
                <div class="col form-group">
                    <label for="">Gender</label> <br>
                    <input name="gender" type="radio">Male
                    <input name="gender" type="radio">Female
                    <input name="gender" type="radio">Others
                </div>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="">Date Of Birth:</label>
                    <input type="date" class="form-control">
                </div>
                <div class="col form-group">
                    <label for="">City</label>
                    <select class="form-select">
                        <option value="">Choose City</option>
                        <option value="">Hyderabad</option>
                        <option value="">Kochi</option>
                        <option value="">Bangalore</option>
                        <option value="">Vijayawada</option>
                    </select>

                </div>

            </div>

            <div class="row my-2">
                <div class="col form-group">
                    <label for="">Address :</label>
                    <input type="text" placeholder="Enter Full Address" class="form-control">
                </div>
            </div>
            <div class="row">
                <button type="submit" class="btn btn-primary my-2">Register</button>
                <button type="reset" class="btn btn-warning">Cancel</button>
            </div>
        </fieldset>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
